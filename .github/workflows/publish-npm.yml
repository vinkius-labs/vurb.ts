name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build core (must be first)
        run: npm run build -w packages/core

      - name: Build satellite packages
        run: npm run build -ws --if-present

      - name: Run tests
        run: npm test
        env:
          CI: true

      - name: Publish core package
        run: npm publish -w packages/core --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish testing package
        run: npm publish -w packages/testing --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish openapi-gen package
        run: npm publish -w packages/openapi --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish prisma-gen package
        run: npm publish -w packages/prisma-gen --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish n8n connector package
        run: npm publish -w packages/n8n --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish aws connector package
        run: npm publish -w packages/aws --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish oauth package
        run: npm publish -w packages/oauth --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish jwt package
        run: npm publish -w packages/jwt --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish api-key package
        run: npm publish -w packages/api-key --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish cloudflare adapter package
        run: npm publish -w packages/cloudflare --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish vercel adapter package
        run: npm publish -w packages/vercel --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish inspector package
        run: npm publish -w packages/inspector --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish skills package
        run: npm publish -w packages/skills --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish swarm package
        run: npm publish -w packages/swarm --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish yaml package
        run: npm publish -w packages/yaml --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Notify Discord — new release
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          # Truncate body to 300 chars to keep embed clean
          BODY="${RELEASE_BODY:0:300}"
          [ ${#RELEASE_BODY} -gt 300 ] && BODY="${BODY}..."

          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🚀 Vurb.ts ${RELEASE_TAG} released\",
                \"url\": \"${RELEASE_URL}\",
                \"description\": \"${BODY//$'\"'/\\\\\"}\",
                \"color\": 5763719,
                \"fields\": [
                  {
                    \"name\": \"Install\",
                    \"value\": \"\\\`\\\`\\\`bash\\nnpm install @vurb/core@${RELEASE_TAG}\\n\\\`\\\`\\\`\",
                    \"inline\": false
                  }
                ],
                \"footer\": {
                  \"text\": \"vinkius-labs/vurb.ts\"
                },
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }"
